<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Briefcase top handle -->
  <rect x="12" y="8" width="8" height="3" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Briefcase body -->
  <rect x="7" y="11" width="18" height="13" rx="2.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Center divider line -->
  <line x1="7" y1="17" x2="25" y2="17" stroke="white" stroke-width="1.5"/>
  <!-- Small code brackets -->
  <text x="16" y="22.5" font-family="monospace" font-size="5.5" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">&lt;/&gt;</text>
</svg>
